<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Station Settings - EA Station</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e21 0%, #1a1f3a 100%);
            min-height: 100vh;
        }

        .app-container {
            max-width: 450px;
            margin: 0 auto;
            background: #0f1225;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #0a0e21 0%, #12152b 100%);
            padding: 25px 20px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
        }

        .station-name {
            color: #00d4ff;
            font-size: 18px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h1 {
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        h1 span {
            color: #00d4ff;
        }

        .subtitle {
            color: #8890b0;
            font-size: 13px;
            margin-top: 5px;
        }

        /* Form Container */
        .form-container {
            padding: 20px;
            flex: 1;
        }

        .form-card {
            background: linear-gradient(135deg, #1a1f3a, #141834);
            border-radius: 25px;
            padding: 25px;
            border: 1px solid rgba(0, 212, 255, 0.15);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #b0b5d0;
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        label i {
            margin-right: 8px;
        }

        input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        input:read-only {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* Save Button */
        .save-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 212, 255, 0.3);
        }

        .save-btn:active {
            transform: translateY(0);
        }

        /* Info Card */
        .info-card {
            background: rgba(0, 212, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .info-icon {
            font-size: 24px;
        }

        .info-text {
            flex: 1;
            color: #00d4ff;
            font-size: 12px;
        }

        /* Bottom Navigation */
        .bottom-nav {
            background: rgba(15, 18, 37, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 20px 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .nav-icon {
            font-size: 22px;
        }

        .nav-label {
            font-size: 11px;
            color: #8890b0;
        }

        .nav-item.active .nav-label {
            color: #00d4ff;
        }

        /* Toast Message */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            max-width: 410px;
            margin: 0 auto;
            background: #00ff88;
            color: #0a0e21;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            z-index: 100;
            display: none;
            animation: slideUp 0.3s ease;
        }

        .toast.error {
            background: #ff6b6b;
            color: white;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="station-name">
                ⛽ <span id="stationName">Loading...</span>
            </div>
            <h1>Station <span>Settings</span></h1>
            <div class="subtitle">Manage your station information</div>
        </div>

        <div class="form-container">
            <div class="form-card">
                <div class="form-group">
                    <label><i>🏢</i> Company Name</label>
                    <input id="name" type="text" placeholder="Enter company name">
                </div>

                <div class="form-group">
                    <label><i>💰</i> Gas Price (per liter)</label>
                    <input id="gas-price" type="number" step="0.01" placeholder="Enter price in ETB">
                </div>

                <div class="form-group">
                    <label><i>⛽</i> Current Fuel (Liters)</label>
                    <input id="current-fuel" type="number" placeholder="Enter available fuel in liters">
                </div>

                <div class="form-group">
                    <label><i>📍</i> Location</label>
                    <input id="location" type="text" placeholder="Enter station location">
                </div>

                <button class="save-btn" onclick="saveOnDB()">
                    💾 Save Changes
                </button>

                <div class="info-card">
                    <div class="info-icon">ℹ️</div>
                    <div class="info-text">
                        Changes will be updated in real-time for all drivers
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <div class="nav-item" onclick="window.location.href='home.html'">
                <div class="nav-icon">🏠</div>
                <div class="nav-label">Home</div>
            </div>
            <div class="nav-item active">
                <div class="nav-icon">📝</div>
                <div class="nav-label">Input</div>
            </div>
            <div class="nav-item" onclick="window.location.href='message.html'">
                <div class="nav-icon">💬</div>
                <div class="nav-label">Message</div>
            </div>
            <div class="nav-item" onclick="window.location.href='profile.html'">
                <div class="nav-icon">👤</div>
                <div class="nav-label">Profile</div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBW1nFDfogr_V3uAsrMPjx1tDULl7URgZQ",
            authDomain: "ea-station.firebaseapp.com",
            databaseURL: "https://ea-station-default-rtdb.firebaseio.com",
            projectId: "ea-station",
            storageBucket: "ea-station.firebasestorage.app",
            messagingSenderId: "493379253444",
            appId: "1:493379253444:web:6319c915469b0359040591",
            measurementId: "G-X670BF4H52"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        
        let stationId = localStorage.getItem("stationId");
        let stationName = localStorage.getItem("stationName");                
        
        const stationRef = ref(database, `EA station/stations/${stationId}/Information`);
        const NMEle = document.getElementById("name");
        const GP = document.getElementById("gas-price");
        const CP = document.getElementById("current-fuel");
        const Location = document.getElementById("location");
        
        document.getElementById("stationName").textContent = stationName;
        
        function showToast(message, isError = false) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.className = isError ? "toast error" : "toast";
            toast.style.display = "block";
            setTimeout(() => {
                toast.style.display = "none";
            }, 3000);
        }
        
        async function loadStationData() {
            const station = await get(stationRef);
            if (station.exists()) {
                const data = station.val();
                NMEle.value = data.name || "";
                GP.value = data.fuelprice || "";
                CP.value = data.fuelLeft || "";
                Location.value = data.location || "";
            }
        }
        
        window.saveOnDB = async () => {
            const updatedStation = {
                name: NMEle.value,
                fuelprice: GP.value,
                fuelLeft: CP.value,
                location: Location.value,
                stationId: stationId,
                lastUpdated: Date.now()
            };
            
            try {
                await set(stationRef, updatedStation);
                showToast("✅ Station information saved successfully!");
            } catch (error) {
                showToast("❌ Error: " + error.message, true);
            }
        };
        
        loadStationData();
    </script>
</body>
</html>
