<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Driver Management - EA Station</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e21 0%, #1a1f3a 100%);
            min-height: 100vh;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            background: #0f1225;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #0a0e21 0%, #12152b 100%);
            padding: 20px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
        }

        .station-name {
            color: #00d4ff;
            font-size: 18px;
            margin-bottom: 5px;
        }

        h1 {
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        h1 span {
            color: #00d4ff;
        }

        .subtitle {
            color: #8890b0;
            font-size: 13px;
            margin-top: 5px;
        }

        /* Controls Bar */
        .controls-bar {
            padding: 15px 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 25px;
            padding: 10px 15px;
        }

        .search-box span {
            font-size: 18px;
            margin-right: 8px;
        }

        .search-box input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .search-box input::placeholder {
            color: #556080;
        }

        .sort-select {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            padding: 10px 15px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }

        .sort-select option {
            background: #0f1225;
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            border-radius: 25px;
            padding: 10px 15px;
            color: #00d4ff;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: rgba(0, 212, 255, 0.2);
        }

        /* Stats Row */
        .stats-row {
            padding: 15px 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-badge {
            background: rgba(0, 212, 255, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
            color: #00d4ff;
        }

        .stat-badge span {
            color: white;
            font-weight: bold;
        }

        /* Drivers Grid */
        .drivers-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            max-height: calc(100vh - 200px);
        }

        .drivers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        /* Driver Card */
        .driver-card {
            background: linear-gradient(135deg, #1a1f3a, #141834);
            border-radius: 20px;
            border: 1px solid rgba(0, 212, 255, 0.15);
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .driver-card:hover {
            transform: translateY(-3px);
            border-color: rgba(0, 212, 255, 0.4);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        /* Card Header */
        .card-header {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .driver-avatar {
            width: 60px;
            height: 60px;
            background: rgba(0, 212, 255, 0.15);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            overflow: hidden;
        }

        .driver-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .driver-info {
            flex: 1;
        }

        .driver-name {
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        .driver-id {
            color: #556080;
            font-size: 11px;
            margin-top: 4px;
        }

        .driver-contact {
            color: #8890b0;
            font-size: 12px;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Card Stats */
        .card-stats {
            padding: 15px 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            color: #00d4ff;
            font-size: 22px;
            font-weight: bold;
        }

        .stat-label {
            color: #8890b0;
            font-size: 10px;
            margin-top: 4px;
        }

        /* Order History */
        .order-history {
            padding: 15px 20px;
        }

        .history-title {
            color: white;
            font-size: 13px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .history-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 8px 10px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .history-station {
            color: white;
        }

        .history-fuel {
            color: #00d4ff;
            font-weight: bold;
        }

        .history-date {
            color: #556080;
            font-size: 10px;
        }

        .history-status {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
        }

        .status-pending {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        .status-done {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .status-cancelled {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }

        /* View More */
        .view-more {
            text-align: center;
            padding: 10px;
            color: #00d4ff;
            font-size: 12px;
            cursor: pointer;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: #0f1225;
            border-radius: 30px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .modal-header .driver-avatar {
            width: 50px;
            height: 50px;
        }

        .modal-header .driver-name {
            font-size: 20px;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .modal-stat {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }

        .modal-stat-value {
            color: #00d4ff;
            font-size: 28px;
            font-weight: bold;
        }

        .modal-stat-label {
            color: #8890b0;
            font-size: 12px;
            margin-top: 5px;
        }

        .all-orders {
            margin-top: 20px;
        }

        .close-modal {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            border-radius: 25px;
            padding: 12px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #556080;
        }

        .empty-icon {
            font-size: 60px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            max-width: 360px;
            margin: 0 auto;
            background: #ff6b6b;
            color: white;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            z-index: 1100;
            display: none;
            animation: slideUp 0.3s ease;
        }

        .toast.success {
            background: #00ff88;
            color: #0a0e21;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Scrollbar */
        .history-list::-webkit-scrollbar,
        .modal-content::-webkit-scrollbar {
            width: 4px;
        }

        .history-list::-webkit-scrollbar-track,
        .modal-content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .history-list::-webkit-scrollbar-thumb,
        .modal-content::-webkit-scrollbar-thumb {
            background: #00d4ff;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="station-name" id="stationName">Loading...</div>
            <h1>Driver <span>Management</span></h1>
            <div class="subtitle">View and manage all drivers</div>
        </div>

        <div class="controls-bar">
            <div class="search-box">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="Search by name, phone, or ID...">
            </div>
            <select id="sortSelect" class="sort-select">
                <option value="orders">Sort by Most Orders</option>
                <option value="fuel">Sort by Most Fuel Used</option>
                <option value="name">Sort by Name (A-Z)</option>
                <option value="recent">Sort by Most Recent</option>
            </select>
            <button class="refresh-btn" id="refreshBtn">🔄</button>
        </div>

        <div class="stats-row" id="statsRow">
            <div class="stat-badge">👥 Total Drivers: <span id="totalDrivers">0</span></div>
            <div class="stat-badge">📦 Total Orders: <span id="totalOrders">0</span></div>
            <div class="stat-badge">⛽ Total Fuel: <span id="totalFuel">0</span> L</div>
        </div>

        <div class="drivers-container">
            <div class="drivers-grid" id="driversGrid">
                <div class="empty-state">
                    <div class="empty-icon">👥</div>
                    <div>Loading drivers...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="driverModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="driver-avatar" id="modalAvatar">👤</div>
                <div>
                    <div class="driver-name" id="modalName">Loading...</div>
                    <div class="driver-id" id="modalId">ID: ---</div>
                </div>
            </div>
            <div class="modal-body">
                <div class="modal-stats">
                    <div class="modal-stat">
                        <div class="modal-stat-value" id="modalOrders">0</div>
                        <div class="modal-stat-label">Total Orders</div>
                    </div>
                    <div class="modal-stat">
                        <div class="modal-stat-value" id="modalFuel">0</div>
                        <div class="modal-stat-label">Total Fuel (L)</div>
                    </div>
                    <div class="modal-stat">
                        <div class="modal-stat-value" id="modalPrice">0</div>
                        <div class="modal-stat-label">Total Spent (ETB)</div>
                    </div>
                    <div class="modal-stat">
                        <div class="modal-stat-value" id="modalAvg">0</div>
                        <div class="modal-stat-label">Avg Fuel/Order</div>
                    </div>
                </div>
                <div class="all-orders">
                    <div class="history-title">📜 All Order History</div>
                    <div class="history-list" id="modalHistory"></div>
                </div>
                <button class="close-modal" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBW1nFDfogr_V3uAsrMPjx1tDULl7URgZQ",
            authDomain: "ea-station.firebaseapp.com",
            databaseURL: "https://ea-station-default-rtdb.firebaseio.com",
            projectId: "ea-station",
            storageBucket: "ea-station.firebasestorage.app",
            messagingSenderId: "493379253444",
            appId: "1:493379253444:web:6319c915469b0359040591",
            measurementId: "G-X670BF4H52"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        
        const stationId = localStorage.getItem("stationId") || "st_001";
        let allDrivers = [];
        let fuelPrice = 70; // Default price per liter
        
        const ordersRef = ref(database, `EA station/stations/${stationId}/orders`);
        const stationRef = ref(database, `EA station/stations/${stationId}/Information`);
        
        function showToast(message, isSuccess = false) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.className = isSuccess ? "toast success" : "toast";
            toast.style.display = "block";
            setTimeout(() => {
                toast.style.display = "none";
            }, 3000);
        }
        
        async function loadStationInfo() {
            const snapshot = await get(stationRef);
            if (snapshot.exists()) {
                const data = snapshot.val();
                document.getElementById("stationName").textContent = data.name || "EA Station";
                fuelPrice = data.fuelprice || 70;
            }
        }
        
        async function loadDrivers() {
            const snapshot = await get(ordersRef);
            const driverMap = new Map();
            let totalOrdersCount = 0;
            let totalFuelSum = 0;
            
            if (snapshot.exists()) {
                const orders = snapshot.val();
                const ordersArray = Object.entries(orders).map(([id, order]) => ({
                    id,
                    ...order
                }));
                
                // Group by userId
                ordersArray.forEach(order => {
                    totalOrdersCount++;
                    totalFuelSum += parseFloat(order.fuel) || 0;
                    
                    if (!driverMap.has(order.userId)) {
                        driverMap.set(order.userId, {
                            userId: order.userId,
                            name: order.name || "Unknown Driver",
                            orders: [],
                            totalFuel: 0,
                            totalOrders: 0,
                            lastOrderTime: 0,
                            phoneNumber: "",
                            photo: ""
                        });
                    }
                    
                    const driver = driverMap.get(order.userId);
                    driver.orders.push(order);
                    driver.totalFuel += parseFloat(order.fuel) || 0;
                    driver.totalOrders++;
                    if (order.time > driver.lastOrderTime) {
                        driver.lastOrderTime = order.time;
                    }
                });
                
                // Load additional info for each driver
                for (let [userId, driver] of driverMap) {
                    const userRef = ref(database, `EA station/users/${userId}`);
                    const userSnapshot = await get(userRef);
                    if (userSnapshot.exists()) {
                        const userData = userSnapshot.val();
                        driver.name = userData.name || driver.name;
                        driver.phoneNumber = userData.phoneNumber || "";
                        driver.photo = userData.photo || "";
                        driver.talga = userData.talga || "";
                    }
                    
                    // Sort orders by time (newest first)
                    driver.orders.sort((a, b) => b.time - a.time);
                }
                
                allDrivers = Array.from(driverMap.values());
            }
            
            document.getElementById("totalDrivers").textContent = allDrivers.length;
            document.getElementById("totalOrders").textContent = totalOrdersCount;
            document.getElementById("totalFuel").textContent = Math.round(totalFuelSum);
            
            renderDrivers();
        }
        
        function renderDrivers() {
            const searchTerm = document.getElementById("searchInput").value.toLowerCase();
            const sortBy = document.getElementById("sortSelect").value;
            
            let filtered = allDrivers.filter(driver => 
                driver.name.toLowerCase().includes(searchTerm) ||
                driver.userId.toLowerCase().includes(searchTerm) ||
                driver.phoneNumber.includes(searchTerm)
            );
            
            // Sort
            switch(sortBy) {
                case "orders":
                    filtered.sort((a, b) => b.totalOrders - a.totalOrders);
                    break;
                case "fuel":
                    filtered.sort((a, b) => b.totalFuel - a.totalFuel);
                    break;
                case "name":
                    filtered.sort((a, b) => a.name.localeCompare(b.name));
                    break;
                case "recent":
                    filtered.sort((a, b) => b.lastOrderTime - a.lastOrderTime);
                    break;
            }
            
            const grid = document.getElementById("driversGrid");
            
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <div>No drivers found</div>
                        <div style="font-size: 12px; margin-top: 8px;">Try a different search</div>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = "";
            filtered.forEach(driver => {
                const card = createDriverCard(driver);
                grid.appendChild(card);
            });
        }
        
        function createDriverCard(driver) {
            const card = document.createElement("div");
            card.className = "driver-card";
            card.onclick = () => showDriverDetails(driver);
            
            const totalSpent = Math.round(driver.totalFuel * fuelPrice);
            const completedOrders = driver.orders.filter(o => o.status === "done").length;
            const pendingOrders = driver.orders.filter(o => o.status === "pending").length;
            
            // Get recent orders (last 3)
            const recentOrders = driver.orders.slice(0, 3);
            console.log(driver.photo);
            card.innerHTML = `
                <div class="card-header">
                    <div class="driver-avatar">
                        ${driver.photo ? `<img src="${driver.photo}" alt="avatar">` : '👤'}
                    </div>
                    <div class="driver-info">
                        <div class="driver-name">${escapeHtml(driver.name)}</div>
                        <div class="driver-id">ID: ${driver.userId?.slice(-8) || "N/A"}</div>
                        ${driver.phoneNumber ? `<div class="driver-contact">📞 ${driver.phoneNumber}</div>` : ''}
                    </div>
                </div>
                <div class="card-stats">
                    <div class="stat-item">
                        <div class="stat-value">${driver.totalOrders}</div>
                        <div class="stat-label">Orders</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${Math.round(driver.totalFuel)}</div>
                        <div class="stat-label">Fuel (L)</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${totalSpent}</div>
                        <div class="stat-label">Spent (ETB)</div>
                    </div>
                </div>
                <div class="order-history">
                    <div class="history-title">📋 Recent Orders</div>
                    <div class="history-list">
                        ${recentOrders.map(order => `
                            <div class="history-item">
                                <span class="history-station">⛽ ${order.fuel || 0}L</span>
                                <span class="history-status status-${order.status || 'pending'}">${order.status || 'pending'}</span>
                                <span class="history-date">${new Date(order.time).toLocaleDateString()}</span>
                            </div>
                        `).join('')}
                        ${driver.totalOrders > 3 ? `<div class="view-more">+ ${driver.totalOrders - 3} more orders...</div>` : ''}
                    </div>
                </div>
            `;
            
            return card;
        }
        
        async function showDriverDetails(driver) {
            const modal = document.getElementById("driverModal");
            const totalSpent = Math.round(driver.totalFuel * fuelPrice);
            const avgFuel = driver.totalOrders > 0 ? Math.round(driver.totalFuel / driver.totalOrders) : 0;
            
            document.getElementById("modalName").textContent = driver.name;
            document.getElementById("modalId").textContent = `ID: ${driver.userId || "N/A"}`;
            document.getElementById("modalOrders").textContent = driver.totalOrders;
            document.getElementById("modalFuel").textContent = Math.round(driver.totalFuel);
            document.getElementById("modalPrice").textContent = totalSpent;
            document.getElementById("modalAvg").textContent = avgFuel;
            
            const avatarDiv = document.getElementById("modalAvatar");
            if (driver.photo) {
                avatarDiv.innerHTML = `<img src="${driver.photo}" alt="avatar" style="width:100%;height:100%;object-fit:cover;">`;
            } else {
                avatarDiv.innerHTML = "👤";
                avatarDiv.style.fontSize = "30px";
                avatarDiv.style.display = "flex";
                avatarDiv.style.alignItems = "center";
                avatarDiv.style.justifyContent = "center";
            }
            
            const historyDiv = document.getElementById("modalHistory");
            if (driver.orders.length === 0) {
                historyDiv.innerHTML = '<div style="text-align:center;color:#556080;padding:20px;">No orders yet</div>';
            } else {
                historyDiv.innerHTML = driver.orders.map(order => `
                    <div class="history-item">
                        <div>
                            <div class="history-station">⛽ ${order.fuel || 0} Liters</div>
                            <div class="history-date">${new Date(order.time).toLocaleString()}</div>
                        </div>
                        <div>
                            <span class="history-status status-${order.status || 'pending'}">${order.status || 'pending'}</span>
                        </div>
                    </div>
                `).join('');
            }
            
            modal.style.display = "flex";
        }
        
        window.closeModal = function() {
            document.getElementById("driverModal").style.display = "none";
        };
        
        function escapeHtml(text) {
            if (!text) return "Unknown";
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Event listeners
        document.getElementById("refreshBtn").addEventListener("click", () => {
            loadDrivers();
            showToast("🔄 Refreshed!", true);
        });
        
        document.getElementById("searchInput").addEventListener("input", () => renderDrivers());
        document.getElementById("sortSelect").addEventListener("change", () => renderDrivers());
        
        // Close modal on outside click
        document.getElementById("driverModal").addEventListener("click", (e) => {
            if (e.target === document.getElementById("driverModal")) {
                closeModal();
            }
        });
        
        // Initial load
        loadStationInfo();
        loadDrivers();
        
        // Listen for real-time updates
        onValue(ordersRef, () => {
            loadDrivers();
        });
    </script>
</body>
</html>
