<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Messages - EA Station Owner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e21 0%, #1a1f3a 100%);
            min-height: 100vh;
        }

        .app-container {
            max-width: 450px;
            margin: 0 auto;
            background: #0f1225;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #0a0e21 0%, #12152b 100%);
            padding: 25px 20px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
        }

        .station-name {
            color: #00d4ff;
            font-size: 18px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h1 {
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        h1 span {
            color: #00d4ff;
        }

        .subtitle {
            color: #8890b0;
            font-size: 13px;
            margin-top: 5px;
        }

        /* Search Bar */
        .search-bar {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .search-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(255, 255, 255, 0.12);
        }

        .search-input::placeholder {
            color: #556080;
        }

        /* Chat List */
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px 20px;
        }

        .chat-item {
            background: linear-gradient(135deg, #1a1f3a, #141834);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(0, 212, 255, 0.1);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-item:hover {
            transform: translateX(5px);
            border-color: rgba(0, 212, 255, 0.4);
            background: linear-gradient(135deg, #1e2445, #161a3a);
        }

        .avatar {
            width: 55px;
            height: 55px;
            background: rgba(0, 212, 255, 0.15);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            position: relative;
        }

        .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #00ff88;
            border-radius: 50%;
            border: 2px solid #1a1f3a;
        }

        .chat-info {
            flex: 1;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .chat-name {
            color: white;
            font-size: 16px;
            font-weight: 600;
        }

        .chat-time {
            color: #556080;
            font-size: 11px;
        }

        .chat-message {
            color: #8890b0;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge {
            background: #00d4ff;
            color: #0a0e21;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 12px;
            min-width: 20px;
            text-align: center;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #556080;
        }

        .empty-icon {
            font-size: 60px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* Bottom Navigation */
        .bottom-nav {
            background: rgba(15, 18, 37, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 20px 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .nav-icon {
            font-size: 22px;
        }

        .nav-label {
            font-size: 11px;
            color: #8890b0;
        }

        .nav-item.active .nav-label {
            color: #00d4ff;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="station-name">
                ⛽ <span id="stationName">Loading...</span>
            </div>
            <h1>Messages</h1>
            <div class="subtitle">Chat with your drivers</div>
        </div>

        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search driver...">
        </div>

        <div class="chat-list" id="chatList">
            <div class="empty-state">
                <div class="empty-icon">💬</div>
                <div>Loading conversations...</div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <div class="nav-item" onclick="window.location.href='home.html'">
                <div class="nav-icon">🏠</div>
                <div class="nav-label">Home</div>
            </div>
            <div class="nav-item" onclick="window.location.href='input.html'">
                <div class="nav-icon">📝</div>
                <div class="nav-label">Input</div>
            </div>
            <div class="nav-item active">
                <div class="nav-icon">💬</div>
                <div class="nav-label">Message</div>
            </div>
            <div class="nav-item" onclick="window.location.href='profile.html'">
                <div class="nav-icon">👤</div>
                <div class="nav-label">Profile</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBW1nFDfogr_V3uAsrMPjx1tDULl7URgZQ",
            authDomain: "ea-station.firebaseapp.com",
            databaseURL: "https://ea-station-default-rtdb.firebaseio.com",
            projectId: "ea-station",
            storageBucket: "ea-station.firebasestorage.app",
            messagingSenderId: "493379253444",
            appId: "1:493379253444:web:6319c915469b0359040591",
            measurementId: "G-X670BF4H52"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const stationId = "st_001";
        const stationName = "Bole Total";
        const chatList = document.getElementById("chatList");
        const searchInput = document.getElementById("searchInput");
        
        document.getElementById("stationName").textContent = stationName;

        let allChats = [];

        const messageRef = ref(db, "EA station/messages");

        onValue(messageRef, async (snapshot) => {
            const data = snapshot.val();
            
            if (!data) {
                chatList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">💬</div>
                        <div>No messages yet</div>
                        <div style="font-size: 12px; margin-top: 10px;">When drivers message you, they'll appear here</div>
                    </div>
                `;
                return;
            }

            const chats = [];

            Object.keys(data).forEach(convoId => {
                if (!convoId.includes(stationId)) return;

                const messages = data[convoId];
                const [part1, part2] = convoId.split("-WITH-");
                const otherUser = part1 === stationId ? part2 : part1;

                const messagesArray = Object.values(messages);
                const lastMsg = messagesArray.sort((a, b) => b.time - a.time)[0];

                chats.push({
                    otherUser,
                    message: lastMsg.message,
                    time: lastMsg.time,
                    convoId: convoId
                });
            });

            chats.sort((a, b) => b.time - a.time);
            allChats = chats;
            renderChats(chats);
        });

        async function renderChats(chats) {
            if (chats.length === 0) {
                chatList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <div>No conversations found</div>
                    </div>
                `;
                return;
            }

            chatList.innerHTML = "";
            
            for (const chat of chats) {
                const div = document.createElement("div");
                div.className = "chat-item";
                
                const time = new Date(chat.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                let driverName = "Driver";
                let driverPhoto = "👤";
                
                const nameSnapshot = await get(ref(db, `EA station/users/${chat.otherUser}/name`));
                if (nameSnapshot.exists()) {
                    driverName = nameSnapshot.val();
                }
                
                const photoSnapshot = await get(ref(db, `EA station/users/${chat.otherUser}/photo`));
                if (photoSnapshot.exists() && photoSnapshot.val()) {
                    driverPhoto = "👨‍🚗";
                }
                
                // Count unread messages (simplified - you can implement proper unread logic)
                const messagePreview = chat.message.length > 40 ? chat.message.substring(0, 40) + "..." : chat.message;
                
                div.innerHTML = `
                    <div class="avatar">
                        ${driverPhoto}
                        <div class="online-dot"></div>
                    </div>
                    <div class="chat-info">
                        <div class="chat-header">
                            <span class="chat-name">${driverName}</span>
                            <span class="chat-time">${time}</span>
                        </div>
                        <div class="chat-message">${messagePreview}</div>
                    </div>
                    <div class="badge">●</div>
                `;
                
                div.addEventListener("click", () => {
                    window.location.href = `chat-detail.html?userId=${chat.otherUser}&stationId=${stationId}`;
                });
                
                chatList.appendChild(div);
            }
        }

        // Search functionality
        searchInput.addEventListener("input", (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = allChats.filter(chat => {
                return getDriverName(chat.otherUser).then(name => {
                    return name.toLowerCase().includes(searchTerm);
                });
            });
            // Simplified - just re-render with current chats
            renderChats(allChats.filter(chat => {
                return chat.otherUser.toLowerCase().includes(searchTerm);
            }));
        });
        
        async function getDriverName(userId) {
            const snapshot = await get(ref(db, `EA station/users/${userId}/name`));
            return snapshot.exists() ? snapshot.val() : userId;
        }
    </script>
</body>
</html>
